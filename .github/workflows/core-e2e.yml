name: Core E2E

on:
  push:
    paths:
      - ".github/workflows/core-e2e.yml"
      - "scripts/test-e2e.sh"
      - "scripts/test-create-jira-approval-e2e.sh"
      - "scripts/test-opencode-e2e.sh"
      - "packages/**"
      - "docker/**"
      - docker-compose.yml
      - Dockerfile
      - pnpm-lock.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_BOT_USER_ID: ${{ vars.SLACK_BOT_USER_ID }}
      SLACK_DEFAULT_REPO: acme-multi-hyphen-repo
      SLACK_E2E_CHANNEL_ID: ${{ vars.SLACK_E2E_CHANNEL_ID || vars.SLACK_CHANNEL_ID }}
      SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      GITHUB_APP_ID: ${{ vars.THOR_GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY_FILE: /var/lib/remote-cli/github-app/private-key.pem
      THOR_GITHUB_APP_PRIVATE_KEY: ${{ secrets.THOR_GITHUB_APP_PRIVATE_KEY }}
      THOR_GITHUB_APP_INSTALLATION_ID: ${{ vars.THOR_GITHUB_APP_INSTALLATION_ID }}
      # GitHub App identity — required by docker-compose since the webhook plan.
      # CI does not exercise live webhook intake; ci-fake values are sufficient
      # to satisfy compose interpolation and remote-cli/gateway boot checks.
      GITHUB_APP_SLUG: thor-ci
      GITHUB_APP_BOT_ID: "1"
      GITHUB_WEBHOOK_SECRET: ci-fake
      REMOTE_CLI_GIT_REPO_URL: https://github.com/${{ github.repository }}
      REMOTE_CLI_GITHUB_REPO: ${{ github.repository }}
      ATTRIBUTION_E2E_SLACK_ID: U_E2E_ATTRIBUTION
      ATTRIBUTION_E2E_NAME: ${{ vars.THOR_E2E_JIRA_NAME || 'Thor E2E Reviewer' }}
      ATTRIBUTION_E2E_GITHUB: ${{ github.actor }}
      THOR_E2E_JIRA_EMAIL: ${{ vars.THOR_E2E_JIRA_EMAIL || 'thor-e2e-reviewer@example.com' }}
      ATLASSIAN_CLOUD_ID: ${{ vars.ATLASSIAN_CLOUD_ID }}
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      DAYTONA_SNAPSHOT: ${{ vars.DAYTONA_SNAPSHOT }}
      ATLASSIAN_AUTH: ${{ secrets.ATLASSIAN_AUTH }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      # Real Grafana Cloud creds so the full tool surface (incl. Tempo) is listed
      # and validated by the drift check. Use a read-only, minimal-scope token.
      # If unset, grafana resolves to disabled and the drift check skips it.
      GRAFANA_URL: ${{ vars.GRAFANA_URL }}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      GRAFANA_ORG_ID: ${{ vars.GRAFANA_ORG_ID }}
      LANGFUSE_PUBLIC_KEY: ${{ vars.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
      # Fakes: services not exercised by e2e, but referenced at compose startup.
      METABASE_URL: http://localhost
      METABASE_API_KEY: ci-fake
      METABASE_DATABASE_ID: "1"
      METABASE_ALLOWED_SCHEMAS: public
      RUNNER_BASE_URL: http://localhost:3000
      THOR_E2E_TEST_HELPERS: "1"
      VOUCH_GOOGLE_CLIENT_ID: ci-fake
      VOUCH_GOOGLE_CLIENT_SECRET: ci-fake
      VOUCH_JWT_SECRET: ci-fake
      VOUCH_ALLOWED_EMAIL_DOMAINS: localhost
      THOR_ADMIN_EMAILS: ci@localhost,owner@localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bring up compose stack for e2e
        run: |
          set -euo pipefail

          mkdir -p \
            docker-volumes/workspace/repos \
            docker-volumes/workspace/config \
            docker-volumes/workspace/memory \
            docker-volumes/workspace/worklog \
            docker-volumes/workspace/cron \
            docker-volumes/workspace/worktrees \
            docker-volumes/opencode \
            docker-volumes/github-app \
            docker-volumes/home/thor \
            docker-volumes/codex-lb
          # remote-cli runs as the "thor" user; make the mounted home writable.
          chmod 777 docker-volumes/home/thor
          # codex-lb opens a SQLite DB under /var/lib/codex-lb as a non-root user.
          chmod 777 docker-volumes/codex-lb

          printf '%s' "$THOR_GITHUB_APP_PRIVATE_KEY" > docker-volumes/github-app/private-key.pem
          chmod 600 docker-volumes/github-app/private-key.pem

          # MCP credentials are passed to compose services through env_file.
          {
            printf 'ATLASSIAN_AUTH=%s\n' "$ATLASSIAN_AUTH"
            printf 'ATLASSIAN_CLOUD_ID=%s\n' "$ATLASSIAN_CLOUD_ID"
            printf 'POSTHOG_API_KEY=%s\n' "$POSTHOG_API_KEY"
            printf 'GRAFANA_URL=%s\n' "${GRAFANA_URL:-}"
            printf 'GRAFANA_SERVICE_ACCOUNT_TOKEN=%s\n' "${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}"
            printf 'GRAFANA_ORG_ID=%s\n' "${GRAFANA_ORG_ID:-}"
            # CI can't host rootless bwrap, so mcp-grafana runs unsandboxed. The
            # MCP SDK gives the child only a fixed env allowlist + GRAFANA_*, so
            # remote-cli's other secrets never reach it; keep the token read-only.
            printf 'THOR_MCP_DISABLE_SANDBOX=1\n'
            printf 'LANGFUSE_PUBLIC_KEY=%s\n' "$LANGFUSE_PUBLIC_KEY"
            printf 'LANGFUSE_SECRET_KEY=%s\n' "$LANGFUSE_SECRET_KEY"
            printf 'LANGFUSE_BASE_URL=%s\n' "$LANGFUSE_BASE_URL"
          } > .env

          export CRON_SECRET="$(openssl rand -hex 32)"
          export THOR_INTERNAL_SECRET="$(openssl rand -hex 32)"
          {
            echo "CRON_SECRET=$CRON_SECRET"
            echo "THOR_INTERNAL_SECRET=$THOR_INTERNAL_SECRET"
          } >> "$GITHUB_ENV"

          # mitmproxy passthrough needs the bare host (no scheme); derive it
          # from the canonical LANGFUSE_BASE_URL.
          LANGFUSE_HOST="${LANGFUSE_BASE_URL#http://}"
          LANGFUSE_HOST="${LANGFUSE_HOST#https://}"
          LANGFUSE_HOST="${LANGFUSE_HOST%/}"

          cat > docker-volumes/workspace/config/thor.json <<EOF
          {
            "mitmproxy_passthrough": ["${LANGFUSE_HOST}"],
            "owners": {
              "${{ github.repository_owner }}": {
                "github_app_installation_id": ${THOR_GITHUB_APP_INSTALLATION_ID}
              }
            },
            "users": [
              {
                "email": "${THOR_E2E_JIRA_EMAIL}",
                "name": "${ATTRIBUTION_E2E_NAME}",
                "slack": "${ATTRIBUTION_E2E_SLACK_ID}",
                "github": "${ATTRIBUTION_E2E_GITHUB}"
              }
            ]
          }
          EOF

          printf '%s' "$OPENCODE_AUTH_JSON" > docker-volumes/opencode/auth.json
          chmod 600 docker-volumes/opencode/auth.json

          alias_repo_dir="docker-volumes/workspace/repos/acme-multi-hyphen-repo"
          mkdir -p "$alias_repo_dir"
          git init -b main "$alias_repo_dir"
          printf '%s\n' '# CI alias fixture' > "$alias_repo_dir/README.md"
          git -C "$alias_repo_dir" add README.md
          git -C "$alias_repo_dir" -c user.name='Thor CI' -c user.email='thor-ci@localhost' commit -m 'chore: seed alias repo fixture'

          ./scripts/mitmproxy-ca-init.sh

          # CI has no codex-lb upstream accounts; strip the codex-lb provider
          # override so opencode talks to OpenAI directly via auth.json.
          # Also enable the langfuse plugin + OpenTelemetry so the e2e run
          # exercises tracing (LANGFUSE_* are wired into the env_file above).
          # The plugin is referenced by absolute path; bare-name would trigger
          # opencode's runtime `npm install`, which mitmproxy 403s. The package
          # is pre-installed globally in the opencode image (see Dockerfile).
          jq 'del(.provider)
            | .experimental.openTelemetry = true
            | .plugin += ["/usr/local/lib/node_modules/opencode-plugin-langfuse"]' \
            docker/opencode/config/opencode.json \
            > docker/opencode/config/opencode.json.tmp \
            && mv docker/opencode/config/opencode.json.tmp docker/opencode/config/opencode.json

          # The langfuse plugin runs inside the opencode container, which has no
          # env_file, so inject its three vars onto the service. Values are left
          # as compose interpolation refs (resolved from .env at `up`), keeping
          # the secret out of the compose file on disk. The plugin's var has no
          # underscore (LANGFUSE_BASEURL); source it from .env's LANGFUSE_BASE_URL.
          yq -i '
            .services.opencode.environment.LANGFUSE_PUBLIC_KEY = "${LANGFUSE_PUBLIC_KEY:-}" |
            .services.opencode.environment.LANGFUSE_SECRET_KEY = "${LANGFUSE_SECRET_KEY:-}" |
            .services.opencode.environment.LANGFUSE_BASEURL = "${LANGFUSE_BASE_URL:-}"
          ' docker-compose.yml

          docker compose up --build --wait -d

      - name: Run e2e test
        env:
          CI: "true"
        run: pnpm test:e2e

      - name: Run approval card e2e
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/core-e2e'
        env:
          CI: "true"
        run: pnpm test:create-jira-approval-e2e

      - name: Run OpenCode LLM smoke test
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/renovate/opencode-ai-sdk-1.x-lockfile'
        env:
          CI: "true"
        run: pnpm test:opencode-e2e

      - name: Assert no MCP policy drift
        run: |
          set -euo pipefail
          # warmUp() logs a "policy_drift" event when our allow/approve lists name
          # tools an upstream no longer exposes. Prod tolerates it (never fails
          # boot), so catch it here. The e2e run above lets warmup settle, and all
          # upstreams use real creds in CI, so any drift is a real bug.
          logs="$(docker compose logs --no-color remote-cli 2>/dev/null || true)"
          if printf '%s\n' "$logs" | grep -q '"event":"policy_drift"'; then
            echo "::error::MCP policy drift: allow/approve lists reference tools the upstream no longer exposes. Reconcile packages/common/src/proxies.ts against the upstream tool inventory."
            printf '%s\n' "$logs" | grep '"event":"policy_drift"'
            exit 1
          fi
          echo "No MCP policy drift detected."

      - name: Compose status (on failure)
        if: failure()
        run: docker compose ps

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color --timestamps
