name: Sandbox E2E

on:
  push:
    paths:
      - "docker/sandbox/**"
      - "scripts/test-sandbox-e2e.sh"
      - ".github/workflows/sandbox-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: sandbox-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sandbox-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      GITHUB_APP_ID: ${{ vars.THOR_GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY_FILE: /var/lib/remote-cli/github-app/private-key.pem
      THOR_GITHUB_APP_PRIVATE_KEY: ${{ secrets.THOR_GITHUB_APP_PRIVATE_KEY }}
      THOR_GITHUB_APP_INSTALLATION_ID: ${{ vars.THOR_GITHUB_APP_INSTALLATION_ID }}
      # GitHub App identity — required by docker-compose since the webhook plan.
      # Sandbox e2e does not exercise webhook intake; ci-fake values satisfy
      # compose interpolation and remote-cli boot checks.
      GITHUB_APP_SLUG: thor-ci
      GITHUB_APP_BOT_ID: "1"
      GITHUB_WEBHOOK_SECRET: ci-fake
      # Compose requires these for interpolation. Sandbox e2e does not exercise
      # cron/internal auth, so fixed fake values are sufficient.
      CRON_SECRET: ci-fake
      THOR_INTERNAL_SECRET: ci-fake
      # Required by remote-cli for disclaimer URLs; sandbox e2e does not create
      # GitHub/Jira content, so a local fake satisfies compose/startup checks.
      RUNNER_BASE_URL: http://localhost:3000
      # Fakes: services not exercised by sandbox e2e, but referenced at compose startup.
      SLACK_BOT_TOKEN: ci-fake
      SLACK_BOT_USER_ID: U000000000
      SLACK_DEFAULT_REPO: ci-fake
      SLACK_SIGNING_SECRET: ci-fake
      GRAFANA_URL: http://grafana-mcp:8000
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ci-fake
      ATLASSIAN_AUTH: ci-fake
      POSTHOG_API_KEY: ci-fake
      LANGFUSE_PUBLIC_KEY: ${{ vars.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
      METABASE_URL: http://localhost
      METABASE_API_KEY: ci-fake
      METABASE_DATABASE_ID: "1"
      METABASE_ALLOWED_SCHEMAS: public
      VOUCH_GOOGLE_CLIENT_ID: ci-fake
      VOUCH_GOOGLE_CLIENT_SECRET: ci-fake
      VOUCH_JWT_SECRET: ci-fake
      VOUCH_ALLOWED_EMAIL_DOMAINS: localhost
      THOR_ADMIN_EMAILS: ci@localhost,owner@localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/thor-sandbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push sandbox image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: docker/sandbox
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Daytona snapshot from new image
        id: snapshot
        run: |
          set -euo pipefail
          snapshot_name="thor-snapshot"
          image_name="ghcr.io/${{ github.repository_owner }}/thor-sandbox:sha-${GITHUB_SHA}"
          api="https://app.daytona.io/api/snapshots"
          auth=(-H "Authorization: Bearer $DAYTONA_API_KEY")

          daytona_get() {
            local target="$1"
            local body_file status
            body_file="$(mktemp)"
            status="$(curl -sS -o "$body_file" -w '%{http_code}' "${auth[@]}" "$api/$target")"
            printf '%s\n' "$status"
            cat "$body_file"
            rm -f "$body_file"
          }

          json_field() {
            local filter="$1"
            jq -er "$filter" 2>/dev/null || true
          }

          # Delete any stale snapshot with this name (may be in error state).
          # DELETE endpoint requires UUID, so resolve name -> id first.
          echo "Looking up existing snapshot $snapshot_name..."
          lookup_response="$(daytona_get "$snapshot_name")"
          lookup_status="$(printf '%s\n' "$lookup_response" | sed -n '1p')"
          lookup_body="$(printf '%s\n' "$lookup_response" | sed '1d')"
          existing_id=""
          if [[ "$lookup_status" == "200" ]]; then
            existing_id="$(printf '%s' "$lookup_body" | json_field '.id // empty')"
          elif [[ "$lookup_status" != "404" ]]; then
            echo "snapshot lookup returned HTTP $lookup_status; response body:" >&2
            printf '%s\n' "$lookup_body" >&2
            exit 1
          fi
          if [[ -n "$existing_id" ]]; then
            echo "Deleting existing snapshot (id=$existing_id)..."
            curl -sS -X DELETE "${auth[@]}" "$api/$existing_id"
            echo
            # DELETE is async — poll until the name is free (404).
            for attempt in $(seq 1 30); do
              status=$(curl -sS -o /dev/null -w '%{http_code}' "${auth[@]}" "$api/$snapshot_name")
              echo "  attempt $attempt: GET $snapshot_name -> $status"
              [[ "$status" == "404" ]] && break
              sleep 2
            done
            if [[ "$status" != "404" ]]; then
              echo "snapshot still present after delete (status=$status)" >&2
              exit 1
            fi
          else
            echo "No existing snapshot found."
          fi

          echo "Creating snapshot $snapshot_name from $image_name"
          create_response="$(curl -sS --fail-with-body -X POST "${auth[@]}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg name "$snapshot_name" --arg image "$image_name" \
                 '{name: $name, imageName: $image}')" \
            "$api")"
          printf '%s\n' "$create_response"
          snapshot_id="$(printf '%s' "$create_response" | json_field '.id')"
          if [[ -z "$snapshot_id" ]]; then
            echo "snapshot create response did not contain an id" >&2
            exit 1
          fi

          # Poll until active (or timeout).
          echo "Waiting for snapshot to become active..."
          state=""
          for attempt in $(seq 1 60); do
            poll_response="$(daytona_get "$snapshot_id")"
            poll_status="$(printf '%s\n' "$poll_response" | sed -n '1p')"
            poll_body="$(printf '%s\n' "$poll_response" | sed '1d')"
            if [[ "$poll_status" != "200" ]]; then
              echo "  attempt $attempt: GET snapshot id -> HTTP $poll_status"
              sleep 10
              continue
            fi

            state="$(printf '%s' "$poll_body" | json_field '.state')"
            if [[ -z "$state" ]]; then
              echo "  attempt $attempt: snapshot response was not valid JSON or had no state"
              printf '%s\n' "$poll_body"
              sleep 10
              continue
            fi
            echo "  attempt $attempt: state=$state"
            case "$state" in
              active) break ;;
              error|build_failed)
                echo "snapshot entered terminal failure state: $state" >&2
                printf '%s\n' "$poll_body" | jq . || printf '%s\n' "$poll_body"
                exit 1
                ;;
            esac
            sleep 10
          done
          if [[ "$state" != "active" ]]; then
            echo "snapshot did not become active in time (last state: $state)" >&2
            exit 1
          fi

          echo "name=$snapshot_name" >> "$GITHUB_OUTPUT"

      - name: Bring up remote-cli stack
        env:
          DAYTONA_SNAPSHOT: ${{ steps.snapshot.outputs.name }}
        run: |
          set -euo pipefail

          mkdir -p \
            docker-volumes/workspace/repos \
            docker-volumes/workspace/config \
            docker-volumes/opencode \
            docker-volumes/github-app \
            docker-volumes/home/thor
          chmod 777 docker-volumes/home/thor

          printf '%s' "$THOR_GITHUB_APP_PRIVATE_KEY" > docker-volumes/github-app/private-key.pem
          chmod 600 docker-volumes/github-app/private-key.pem

          # MCP credentials are passed to compose services through env_file.
          {
            printf 'ATLASSIAN_AUTH=%s\n' "$ATLASSIAN_AUTH"
            printf 'POSTHOG_API_KEY=%s\n' "$POSTHOG_API_KEY"
            printf 'GRAFANA_URL=%s\n' "$GRAFANA_URL"
            printf 'GRAFANA_SERVICE_ACCOUNT_TOKEN=%s\n' "$GRAFANA_SERVICE_ACCOUNT_TOKEN"
            printf 'GRAFANA_ORG_ID=%s\n' "${GRAFANA_ORG_ID:-1}"
          } > .env

          echo "DAYTONA_SNAPSHOT=$DAYTONA_SNAPSHOT" >> "$GITHUB_ENV"

          cat > docker-volumes/workspace/config/thor.json <<EOF
          {
            "owners": {
              "${{ github.repository_owner }}": {
                "github_app_installation_id": ${THOR_GITHUB_APP_INSTALLATION_ID}
              }
            }
          }
          EOF

          docker compose up --build --wait -d remote-cli

      - name: Run sandbox e2e
        run: pnpm test:sandbox-e2e

      - name: Compose status (on failure)
        if: failure()
        run: docker compose ps || true

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color --timestamps || true
