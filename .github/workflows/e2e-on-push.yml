name: E2E on push

on:
  push:
    paths:
      - ".github/workflows/e2e-on-push.yml"
      - "scripts/test-e2e.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-on-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bring up compose stack for e2e
        env:
          WORKSPACE_CONFIG_JSON: ${{ vars.WORKSPACE_CONFIG_JSON }}
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_BOT_USER_ID: ${{ vars.SLACK_BOT_USER_ID }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GITHUB_PAT: ${{ secrets.THOR_GITHUB_PAT }}
          GITHUB_API_URL: ${{ vars.THOR_GITHUB_API_URL }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ vars.DAYTONA_API_URL }}
          DAYTONA_SNAPSHOT: ${{ vars.DAYTONA_SNAPSHOT }}
          # Fakes: services not exercised by e2e, but referenced at compose startup.
          GRAFANA_URL: http://grafana-mcp:8000
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ci-fake
          ATLASSIAN_AUTH: ci-fake
          POSTHOG_API_KEY: ci-fake
          LANGFUSE_PUBLIC_KEY: ci-fake
          LANGFUSE_SECRET_KEY: ci-fake
          LANGFUSE_HOST: https://us.cloud.langfuse.com
          METABASE_URL: http://localhost
          METABASE_API_KEY: ci-fake
          METABASE_DATABASE_ID: "1"
          METABASE_ALLOWED_SCHEMAS: public
        run: |
          set -euo pipefail

          mkdir -p \
            docker-volumes/workspace/repos \
            docker-volumes/workspace/memory \
            docker-volumes/workspace/worklog \
            docker-volumes/workspace/cron \
            docker-volumes/workspace/worktrees \
            docker-volumes/opencode

          export CRON_SECRET="$(openssl rand -hex 32)"
          export RESOLVE_SECRET="$(openssl rand -hex 32)"
          {
            echo "CRON_SECRET=$CRON_SECRET"
            echo "RESOLVE_SECRET=$RESOLVE_SECRET"
          } >> "$GITHUB_ENV"

          printf '%s' "$WORKSPACE_CONFIG_JSON" > docker-volumes/workspace/config.json
          printf '%s' "$OPENCODE_AUTH_JSON" > docker-volumes/opencode/auth.json
          chmod 600 docker-volumes/opencode/auth.json

          alias_repo_dir="docker-volumes/workspace/repos/acme-multi-hyphen-repo"
          mkdir -p "$alias_repo_dir"
          git init -b main "$alias_repo_dir"
          printf '%s\n' '# CI alias fixture' > "$alias_repo_dir/README.md"
          git -C "$alias_repo_dir" add README.md
          git -C "$alias_repo_dir" -c user.name='Thor CI' -c user.email='thor-ci@localhost' commit -m 'chore: seed alias repo fixture'

          docker compose up --build --wait -d gateway

      - name: Run e2e test
        env:
          CI: "true"
        run: pnpm test:e2e

      - name: Compose status (on failure)
        if: failure()
        run: docker compose ps

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color --timestamps
