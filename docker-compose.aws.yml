# Thor — optional CloudWatch logging overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.aws.yml up --build -d

x-awslogs: &awslogs
  driver: awslogs
  options:
    awslogs-region: us-east-1
    awslogs-group: /thor/ec2
    awslogs-create-group: "true"
    tag: "{{.Name}}"
    mode: non-blocking
    max-buffer-size: "4m"

services:
  remote-cli:
    logging: *awslogs

  mitmproxy:
    logging: *awslogs

  codex-lb:
    logging: *awslogs

  opencode:
    logging: *awslogs

  runner:
    logging: *awslogs

  gateway:
    logging: *awslogs

  cron:
    logging: *awslogs

  admin:
    logging: *awslogs

  vouch:
    logging: *awslogs

  ingress:
    logging: *awslogs
