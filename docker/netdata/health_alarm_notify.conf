# Thor Netdata notifications. Netdata sources this file and calls
# custom_sender() for health transitions when SEND_CUSTOM="YES".
SEND_EMAIL="NO"
SEND_CUSTOM="YES"
DEFAULT_RECIPIENT_CUSTOM="thor"

custom_sender() {
  endpoint="${NETDATA_ALERT_WEBHOOK_URL:-http://remote-cli:3004/internal/netdata-alert}"
  if [ -z "${THOR_INTERNAL_SECRET:-}" ]; then
    echo "Netdata alert delivery skipped: THOR_INTERNAL_SECRET is not set" >&2
    return 1
  fi

  json_string() {
    printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g; s/$/\\n/' | tr -d '\n' | sed 's/\\n$//; s/^/"/; s/$/"/'
  }

  payload="$(printf '{"status":%s,"old_status":%s,"alarm":%s,"chart":%s,"family":%s,"host":%s,"value":%s,"summary":%s,"duration":%s}' \
    "$(json_string "${status:-}")" \
    "$(json_string "${old_status:-}")" \
    "$(json_string "${alarm:-}")" \
    "$(json_string "${chart:-}")" \
    "$(json_string "${family:-}")" \
    "$(json_string "${hostname:-}")" \
    "$(json_string "${value_string:-${value:-}}")" \
    "$(json_string "${info:-}")" \
    "$(json_string "${duration:-}")")"

  curl --fail --silent --show-error \
    --connect-timeout 3 \
    --max-time 10 \
    -H "Content-Type: application/json" \
    -H "x-thor-internal-secret: ${THOR_INTERNAL_SECRET}" \
    --data "${payload}" \
    "${endpoint}" >/dev/null
}
