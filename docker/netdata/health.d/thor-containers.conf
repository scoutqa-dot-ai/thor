# Thor Compose container resource alarms. Netdata cgroup chart names vary by
# runtime/cgroup mode; these templates target Docker cgroup charts discovered
# by the pinned netdata/netdata image and alert when sustained utilization is
# above 90%.

template: thor_container_cpu_usage
      on: cgroup.*.cpu
   class: Utilization
    type: Containers
component: Docker
  lookup: average -1m percentage of user,system
   units: %
   every: 10s
    warn: $this > 85
    crit: $this > 90
   delay: down 1m multiplier 1.5 max 10m
    info: Container CPU usage is above 90% for the last minute.
      to: sysadmin

template: thor_container_memory_usage
      on: cgroup.*.mem
   class: Utilization
    type: Containers
component: Docker
  lookup: average -1m percentage of ram
   units: %
   every: 10s
    warn: $this > 85
    crit: $this > 90
   delay: down 1m multiplier 1.5 max 10m
    info: Container memory usage is above 90% for the last minute.
      to: sysadmin
