server {
    listen 8080;

    # Vouch Proxy endpoints (unauthenticated)
    location /vouch/ {
        proxy_pass http://vouch:9090;
        proxy_set_header Host $http_host;
    }

    # Internal auth subrequest — called by auth_request
    location = /vouch/validate {
        internal;
        proxy_pass http://vouch:9090;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # On 401 → redirect to Vouch login
    error_page 401 = @error401;
    location @error401 {
        return 302 http://$http_host/vouch/login?url=$scheme://$http_host$uri;
    }

    # Slack webhooks — no auth required
    location /slack/ {
        proxy_pass http://gateway:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # GitHub webhooks — no auth required
    location /github/ {
        proxy_pass http://gateway:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other routes — protected by Google SSO
    location / {
        auth_request /vouch/validate;

        auth_request_set $auth_user $upstream_http_x_vouch_user;
        proxy_set_header X-Vouch-User $auth_user;

        proxy_pass http://opencode:4096;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
