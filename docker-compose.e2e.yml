# E2E-only overrides. Used in CI via COMPOSE_FILE=docker-compose.yml:docker-compose.e2e.yml.
# NOT applied in production, and never auto-loaded by a plain `docker compose up`
# (the filename is not docker-compose.override.yml).
#
# The GitHub Actions runner is a container-in-container environment that cannot
# host a rootless bwrap sandbox: its AppArmor docker-default profile denies the
# mount ops ("Failed to make / slave"), and a nested user namespace cannot map
# uids ("setting up uid map: Permission denied"). The production deploy target
# imposes neither (Phase 1 run.sh validated bwrap there with the seccomp profile
# alone). So for CI only we relax AppArmor and grant CAP_SYS_ADMIN to remote-cli
# so the per-profile grafana child can spawn and be exercised end to end.
# Production keeps the default AppArmor profile and no added capabilities; the
# base compose file's seccomp profile still applies in both.
services:
  remote-cli:
    security_opt:
      - apparmor=unconfined
    cap_add:
      - SYS_ADMIN
