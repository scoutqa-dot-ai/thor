# Thor — optional CloudWatch logging overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.cloudwatch.yml up --build -d

x-awslogs: &awslogs
  driver: awslogs
  options: &awslogs-options
    awslogs-region: us-east-1
    awslogs-group: /thor/ec2
    awslogs-create-group: "true"
    tag: "{{.Name}}"
    mode: non-blocking
    max-buffer-size: "4m"

services:
  remote-cli:
    logging:
      <<: *awslogs
      options: *awslogs-options

  mitmproxy:
    logging:
      <<: *awslogs
      options: *awslogs-options

  codex-lb:
    logging:
      <<: *awslogs
      options: *awslogs-options

  opencode:
    logging:
      <<: *awslogs
      options: *awslogs-options

  runner:
    logging:
      <<: *awslogs
      options: *awslogs-options

  gateway:
    logging:
      <<: *awslogs
      options: *awslogs-options

  cron:
    logging:
      <<: *awslogs
      options: *awslogs-options

  admin:
    logging:
      <<: *awslogs
      options: *awslogs-options

  vouch:
    logging:
      <<: *awslogs
      options: *awslogs-options

  ingress:
    logging:
      <<: *awslogs
      options: *awslogs-options
