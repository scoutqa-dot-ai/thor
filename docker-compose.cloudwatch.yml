# Thor — optional CloudWatch logging overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.cloudwatch.yml up --build -d

x-cloudwatch-logging: &cloudwatch-logging
  driver: awslogs
  options: &cloudwatch-logging-options
    awslogs-region: ${THOR_CLOUDWATCH_LOG_REGION:?set THOR_CLOUDWATCH_LOG_REGION}
    awslogs-group: ${THOR_CLOUDWATCH_LOG_GROUP:?set THOR_CLOUDWATCH_LOG_GROUP}
    awslogs-create-group: "true"
    mode: non-blocking
    max-buffer-size: "4m"

services:
  remote-cli:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: remote-cli

  grafana-mcp:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: grafana-mcp

  mitmproxy:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: mitmproxy

  codex-lb:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: codex-lb

  opencode:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: opencode

  runner:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: runner

  gateway:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: gateway

  cron:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: cron

  admin:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: admin

  vouch:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: vouch

  ingress:
    logging:
      <<: *cloudwatch-logging
      options:
        <<: *cloudwatch-logging-options
        awslogs-stream: ingress
