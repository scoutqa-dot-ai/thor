# Example workflow to notify Thor of GitHub events.
#
# When Thor adds support for new events, update the `on:` triggers and the
# notify job below to include them.

name: "[Thor] Push GitHub events"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, closed]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  push:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest

    # Skip issue_comment events that are not on PRs
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request

    steps:
      - name: Resolve branch
        id: branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "name=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
              ;;
            pull_request_review|pull_request_review_comment)
              echo "name=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
              ;;
            push)
              echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              ;;
            issue_comment)
              BRANCH=$(gh pr view ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --json headRefName -q .headRefName)
              echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Send to Thor
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_EVENT_JSON: ${{ toJSON(github.event) }}
        run: |
          printf '%s' "$GITHUB_EVENT_JSON" > "$RUNNER_TEMP/github-event.json"

          curl -sf -X POST "${{ vars.THOR_GATEWAY_URL }}/github/events" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg event "$EVENT_NAME" \
              --arg branch "$BRANCH_NAME" \
              --arg repository "$REPOSITORY_NAME" \
              --slurpfile payload "$RUNNER_TEMP/github-event.json" \
              '{event: $event, branch: $branch, repository: $repository, payload: $payload[0]}')"
