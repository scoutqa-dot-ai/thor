# Thor — Docker Compose
#
# Start:   LINEAR_API_KEY=xxx POSTHOG_API_KEY=xxx OAUTH_CLIENT_ID=xxx OAUTH_CLIENT_SECRET=xxx SSO_JWT_SECRET=xxx docker compose up --build -d
# Ingress: port 8080 routes /slack/* → gateway, everything else → opencode
# Slack:   add SLACK_SIGNING_SECRET to enable the gateway service
# Test:    ./scripts/test-e2e.sh
# Logs:    docker compose logs -f
# Stop:    docker compose down

services:
  slack-mcp:
    build:
      context: .
      target: slack-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      - NODE_ENV=production
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_ALLOWED_CHANNEL_IDS=${SLACK_ALLOWED_CHANNEL_IDS:-}
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  git-mcp:
    build:
      context: .
      target: git-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3004"
    environment:
      - NODE_ENV=production
      - GITHUB_PAT=${GITHUB_PAT}
    volumes:
      - ./docker-volumes/workspace:/workspace
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3004/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxy:
    build:
      context: .
      target: proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3010"
      - "127.0.0.1:3011:3011"
      - "127.0.0.1:3012:3012"
      - "127.0.0.1:3013:3013"
      - "127.0.0.1:3014:3014"
    environment:
      - NODE_ENV=production
      - PROXY_INSTANCES=3010:proxy.linear.json,3011:proxy.posthog.json,3012:proxy.slack.json,3013:proxy.github.json,3014:proxy.git.json
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - GITHUB_PAT=${GITHUB_PAT}
    volumes:
      - ./docker-volumes/workspace:/workspace
    depends_on:
      slack-mcp:
        condition: service_healthy
      git-mcp:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all([3010,3011,3012,3013,3014].map(p=>fetch('http://localhost:'+p+'/health'))).then(rs=>{if(rs.some(r=>!r.ok))throw 1})",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  data:
    build:
      context: ./docker/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:80"
    environment:
      - ACME_WEBAPP_ADMIN_API_KEY=${ACME_WEBAPP_ADMIN_API_KEY:-}
      - ACME_AGENT_ADMIN_API_KEY=${ACME_AGENT_ADMIN_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  opencode:
    build:
      context: ./docker/opencode
    restart: unless-stopped
    ports:
      - "127.0.0.1:4096:4096"
    working_dir: /workspace
    command: ["serve", "--port", "4096", "--hostname", "0.0.0.0"]
    volumes:
      - ./docker-volumes/opencode:/root/.local/share/opencode
      - ./docker-volumes/workspace/repos:/workspace/repos:ro
      - ./docker-volumes/workspace/worktrees:/workspace/worktrees
      - ./docker-volumes/workspace/worklog:/workspace/worklog:ro
      - ./docker-volumes/workspace/cron:/workspace/cron
    depends_on:
      proxy:
        condition: service_healthy
      data:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4096/global/health').then(r=>{if(!r.ok)throw 1})",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  runner:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - OPENCODE_URL=http://opencode:4096
    volumes:
      - ./docker-volumes/workspace:/workspace
    depends_on:
      opencode:
        condition: service_healthy

  gateway:
    build:
      context: .
      target: gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - NODE_ENV=production
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_ALLOWED_CHANNEL_IDS=${SLACK_ALLOWED_CHANNEL_IDS:-}
      - CRON_SECRET=${CRON_SECRET:-}
    volumes:
      - ./docker-volumes/workspace:/workspace
    depends_on:
      runner:
        condition: service_started
      slack-mcp:
        condition: service_healthy
      proxy:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  cron:
    build:
      context: ./docker/cron
    restart: unless-stopped
    environment:
      - GATEWAY_URL=http://gateway:3002
      - CRON_SECRET=${CRON_SECRET:-}
    volumes:
      - ./docker-volumes/workspace/cron:/workspace/cron:ro
    depends_on:
      gateway:
        condition: service_healthy

  vouch:
    build:
      context: ./docker/vouch
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/vouch/config.yml:/template/config.yml:ro
    environment:
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:?set OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:?set OAUTH_CLIENT_SECRET}
      - SSO_JWT_SECRET=${SSO_JWT_SECRET:?set SSO_JWT_SECRET}
      - SSO_COOKIE_DOMAIN=${SSO_COOKIE_DOMAIN:-localhost}
      - SSO_CALLBACK_URL=${SSO_CALLBACK_URL:-http://localhost:8080/vouch/auth}
    healthcheck:
      test: ["CMD", "/vouch-proxy", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingress:
    build:
      context: ./docker/ingress
    restart: unless-stopped
    ports:
      - "${INGRESS_PORT:-8080}:8080"
    depends_on:
      gateway:
        condition: service_healthy
      opencode:
        condition: service_healthy
      vouch:
        condition: service_healthy
