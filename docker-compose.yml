# Thor — Docker Compose
#
# Start:   LINEAR_API_KEY=xxx POSTHOG_API_KEY=xxx docker compose up --build -d
# Test:    ./scripts/test-e2e.sh
# Logs:    docker compose logs -f
# Stop:    docker compose down

services:
  proxy:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - PORT=3001
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  runner:
    build:
      context: .
      dockerfile: packages/runner/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OPENCODE_PORT=4096
      - OPENCODE_HOST=127.0.0.1
    volumes:
      - opencode-data:/root/.local/share/opencode
      - ./workspace:/workspace
    depends_on:
      proxy:
        condition: service_healthy

volumes:
  opencode-data:
