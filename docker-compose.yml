# Thor — Docker Compose
#
# Start:   LINEAR_API_KEY=xxx POSTHOG_API_KEY=xxx OPENCODE_SERVER_PASSWORD=xxx docker compose up --build -d
# Ingress: port 8080 routes /slack/* → gateway, everything else → opencode
# Slack:   add SLACK_SIGNING_SECRET and SLACK_BOT_TOKEN to enable the gateway service
# Test:    ./scripts/test-e2e.sh
# Logs:    docker compose logs -f
# Stop:    docker compose down

services:
  slack-mcp:
    build:
      context: .
      target: slack-mcp
    ports:
      - "3003:3003"
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - PORT=3003
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxy-linear:
    build:
      context: .
      target: proxy
    environment:
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - PROXY_CONFIG=/app/packages/proxy/proxy.linear.json
      - PORT=3001
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxy-posthog:
    build:
      context: .
      target: proxy
    environment:
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - PROXY_CONFIG=/app/packages/proxy/proxy.posthog.json
      - PORT=3001
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxy-slack:
    build:
      context: .
      target: proxy
    environment:
      - PROXY_CONFIG=/app/packages/proxy/proxy.slack.json
      - PORT=3001
    depends_on:
      slack-mcp:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  opencode:
    build:
      context: ./docker/opencode
    working_dir: /workspace
    command: ["serve", "--port", "4096", "--hostname", "0.0.0.0"]
    ports:
      - "4096:4096"
    environment:
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:?set OPENCODE_SERVER_PASSWORD}
    volumes:
      - ./docker-volumes/opencode:/root/.local/share/opencode
      - ./docker-volumes/workspace:/workspace
    depends_on:
      proxy-linear:
        condition: service_healthy
      proxy-posthog:
        condition: service_healthy
      proxy-slack:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'AUTH=$$(printf "%s" "$${OPENCODE_SERVER_USERNAME}:$${OPENCODE_SERVER_PASSWORD}" | base64) && wget -qO- --header "Authorization: Basic $$AUTH" http://127.0.0.1:4096/global/health >/dev/null',
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  runner:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OPENCODE_URL=${OPENCODE_URL:-http://opencode:4096}
      - OPENCODE_USERNAME=${OPENCODE_USERNAME:-${OPENCODE_SERVER_USERNAME:-opencode}}
      - OPENCODE_PASSWORD=${OPENCODE_PASSWORD:-${OPENCODE_SERVER_PASSWORD}}
    volumes:
      - ./docker-volumes/workspace:/workspace
    depends_on:
      opencode:
        condition: service_healthy

  gateway:
    build:
      context: .
      target: gateway
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - RUNNER_URL=${RUNNER_URL_FOR_GATEWAY:-http://runner:3000}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_TIMESTAMP_TOLERANCE_SECONDS=${SLACK_TIMESTAMP_TOLERANCE_SECONDS:-300}
    volumes:
      - ./docker-volumes/workspace:/workspace
    depends_on:
      runner:
        condition: service_started
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingress:
    image: nginx:alpine
    ports:
      - "${INGRESS_PORT:-8080}:8080"
    volumes:
      - ./docker/ingress/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
      opencode:
        condition: service_healthy
