# Thor — Docker Compose
#
# Start:   LINEAR_API_KEY=xxx POSTHOG_API_KEY=xxx OPENCODE_SERVER_PASSWORD=xxx docker compose up --build -d
# Slack:   add SLACK_SIGNING_SECRET and SLACK_BOT_TOKEN to enable the gateway service
# Test:    ./scripts/test-e2e.sh
# Logs:    docker compose logs -f
# Stop:    docker compose down

services:
  proxy:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - PORT=3001
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

  opencode:
    image: ghcr.io/anomalyco/opencode:1.2.24
    working_dir: /workspace
    command: ["serve", "--port", "4096", "--hostname", "0.0.0.0"]
    ports:
      - "4096:4096"
    environment:
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:?set OPENCODE_SERVER_PASSWORD}
    volumes:
      - ./docker/opencode/opencode.docker.json:/root/.config/opencode/opencode.json:ro
      - opencode-data:/root/.local/share/opencode
      - ./workspace:/workspace
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'AUTH=$$(printf "%s" "$${OPENCODE_SERVER_USERNAME}:$${OPENCODE_SERVER_PASSWORD}" | base64) && wget -qO- --header "Authorization: Basic $$AUTH" http://127.0.0.1:4096/global/health >/dev/null',
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  runner:
    build:
      context: .
      dockerfile: packages/runner/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OPENCODE_URL=${OPENCODE_URL:-http://opencode:4096}
      - OPENCODE_USERNAME=${OPENCODE_USERNAME:-${OPENCODE_SERVER_USERNAME:-opencode}}
      - OPENCODE_PASSWORD=${OPENCODE_PASSWORD:-${OPENCODE_SERVER_PASSWORD}}
    volumes:
      - ./workspace:/workspace
    depends_on:
      proxy:
        condition: service_healthy
      opencode:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - RUNNER_URL=${RUNNER_URL_FOR_GATEWAY:-http://runner:3000}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_TIMESTAMP_TOLERANCE_SECONDS=${SLACK_TIMESTAMP_TOLERANCE_SECONDS:-300}
    volumes:
      - ./workspace:/workspace
    depends_on:
      runner:
        condition: service_started
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  opencode-data:
